<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>World Map v3</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#050709; display:flex; align-items:flex-start; justify-content:center; min-height:100vh; }
#wrap { position:relative; width:min(100vw, 520px); }
svg { width:100%; height:auto; display:block; }

.field { cursor:pointer; }
.field > path { transition:filter .15s; }
.field:hover > path { filter:brightness(1.4); }
.field.lit > path { filter:brightness(1.6) drop-shadow(0 0 6px rgba(255,240,100,.35)); }

#panel {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
  width:min(300px,calc(100vw - 24px));
  background:rgba(5,7,12,.97); border:1px solid #1e3455; border-radius:9px;
  padding:13px 15px; font-size:13px; z-index:50; display:none;
  box-shadow:0 8px 40px rgba(0,0,0,.9);
}
#panel.show { display:block; }
#ph { display:flex; justify-content:space-between; align-items:center; margin-bottom:9px; }
#pname { font-size:14px; font-weight:700; color:#e8e8e8; }
#px { cursor:pointer; color:#444; font-size:17px; padding-left:10px; }
.pr { display:flex; justify-content:space-between; margin-bottom:4px; font-size:12px; }
.pr .l { color:#555; }
.pr .v { color:#bbb; }
.pr .v.g { color:#76c442; }
.pr .v.y { color:#e8c84a; }
.pr .v.r { color:#e06060; }
.pr .v.p { color:#9b82d4; }
.pdiv { border-top:1px solid #141e2e; margin:7px 0; }
.pbtn {
  width:100%; margin-top:9px; padding:8px; border:none; border-radius:6px;
  font-size:13px; font-weight:700; cursor:pointer;
}
.pbtn.manage  { background:#122a18; color:#76c442; border:1px solid #2a5c28; }
.pbtn.harvest { background:#2a2200; color:#e8c84a; border:1px solid #6a5400; }
.pbtn.buy     { background:#1a1600; color:#c8920a; border:1px solid #604400; }
.pbtn.scout   { background:#160e28; color:#9b82d4; border:1px solid #3a2870; }
</style>
</head>
<body>
<div id="wrap">
<svg viewBox="0 0 420 580" xmlns="http://www.w3.org/2000/svg">
<defs>

<!-- Base soil — entire canvas background -->
<pattern id="soil" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
  <rect width="80" height="80" fill="#110e09"/>
  <rect x="0" y="0" width="40" height="40" fill="#130f0a" opacity=".35"/>
  <rect x="40" y="40" width="40" height="40" fill="#0f0d08" opacity=".25"/>
</pattern>

<!-- Crop patterns (horizontal tillage rows, each crop a slightly different tone/spacing) -->
<pattern id="p-corn" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
  <rect width="5" height="5" fill="#122510"/>
  <line x1="0" y1="2.5" x2="5" y2="2.5" stroke="#1a3618" stroke-width="1.5"/>
</pattern>
<pattern id="p-wheat" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
  <rect width="4" height="4" fill="#1c2a0c"/>
  <line x1="0" y1="2" x2="4" y2="2" stroke="#283c12" stroke-width="1"/>
</pattern>
<pattern id="p-ready" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
  <rect width="4" height="4" fill="#2c3408"/>
  <line x1="0" y1="2" x2="4" y2="2" stroke="#485410" stroke-width="1"/>
</pattern>
<pattern id="p-sun" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
  <rect width="6" height="6" fill="#1c2010"/>
  <line x1="0" y1="0" x2="6" y2="6" stroke="#2c3218" stroke-width="1.2"/>
</pattern>
<pattern id="p-bare" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
  <rect width="8" height="8" fill="#0e1809"/>
</pattern>
<pattern id="p-sale" x="0" y="0" width="7" height="7" patternUnits="userSpaceOnUse">
  <rect width="7" height="7" fill="#181300"/>
</pattern>
<pattern id="p-rivA" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
  <rect width="6" height="6" fill="#1e0808"/>
  <line x1="0" y1="3" x2="6" y2="3" stroke="#2c1010" stroke-width="1.4"/>

  <rect width="6" height="6" fill="#090720"/>
  <line x1="0" y1="3" x2="6" y2="3" stroke="#12103a" stroke-width="1.4"/>
</pattern>

<!-- River gradient -->
<linearGradient id="riverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#0a3a60"/>
  <stop offset="50%" stop-color="#0d5080"/>
  <stop offset="100%" stop-color="#0a3a60"/>
</linearGradient>

</defs>

<!-- ═══ DETAIL PANEL ═══ -->
<div id="panel">
  <div id="ph">
    <div id="pname">—</div>
    <span id="px" onclick="closePanel()">✕</span>
  </div>
  <div class="pr"><span class="l">Owner</span><span class="v" id="pd-own">—</span></div>
  <div class="pr"><span class="l">Size</span><span class="v" id="pd-sz">—</span></div>
  <div class="pr"><span class="l">Crop</span><span class="v" id="pd-crop">—</span></div>
  <div class="pr"><span class="l">Status</span><span class="v" id="pd-st">—</span></div>
  <div class="pr" id="pr-fert"><span class="l">Fertility</span><span class="v g" id="pd-fert">—</span></div>
  <div class="pr" id="pr-price" style="display:none"><span class="l">Asking price</span><span class="v y" id="pd-price">—</span></div>
  <div class="pdiv"></div>
  <button class="pbtn" id="pbtn" onclick="closePanel()">—</button>
</div>

<script>
const D = {
  f1:{ name:'Field F1', own:'You', sz:'~40 ha', crop:'Corn', st:'Growing · 4 days left', stc:'g', fert:'78%', act:'manage', btn:'Manage Field →' },
  f2:{ name:'Field F2', own:'You', sz:'~55 ha', crop:'Wheat', st:'Growing · 8 days left', stc:'g', fert:'65%', act:'manage', btn:'Manage Field →' },
  f3:{ name:'Field F3', own:'Hacienda Rivera', sz:'~90 ha', crop:'Unknown', st:'Competitor — scouting needed', stc:'r', fert:'?', act:'scout', btn:'Buy Scout Report ($500)' },
  f4:{ name:'Field F4', own:'You', sz:'~70 ha', crop:'Sunflower', st:'Growing · 11 days left', stc:'g', fert:'70%', act:'manage', btn:'Manage Field →' },
  f5:{ name:'Field F5', own:'You', sz:'~60 ha', crop:'Wheat', st:'Ready to harvest!', stc:'y', fert:'58%', act:'harvest', btn:'⚡ Harvest Now →' },
  f6:{ name:'Field F6', own:'For Sale', sz:'~75 ha', crop:'—', st:'Available', stc:'y', fert:'74%', price:'~$24,000', act:'buy', btn:'Buy Field →' },
  f7:{ name:'Field F7', own:'Granja del Norte', sz:'~80 ha', crop:'Unknown', st:'Competitor — scouting needed', stc:'p', fert:'?', act:'scout', btn:'Buy Scout Report ($500)' },
  f8:{ name:'Field F8', own:'You', sz:'~35 ha', crop:'—', st:'Unplanted', stc:'', fert:'82%', act:'manage', btn:'Plant a Crop →' },
  f9:{ name:'Field F9', own:'You', sz:'~45 ha', crop:'—', st:'Unplanted', stc:'', fert:'88%', act:'manage', btn:'Plant a Crop →' },
};

let lit = null;
function sel(id) {
  if (lit) lit.classList.remove('lit');
  lit = document.getElementById(id);
  if (lit) lit.classList.add('lit');
  const d = D[id]; if (!d) return;
  document.getElementById('pname').textContent = d.name;
  document.getElementById('pd-own').textContent = d.own;
  document.getElementById('pd-sz').textContent = d.sz;
  document.getElementById('pd-crop').textContent = d.crop;
  const st = document.getElementById('pd-st');
  st.textContent = d.st; st.className = 'v ' + (d.stc||'');
  document.getElementById('pd-fert').textContent = d.fert;
  const pp = document.getElementById('pr-price');
  if (d.price) { pp.style.display='flex'; document.getElementById('pd-price').textContent = d.price; }
  else pp.style.display = 'none';
  const b = document.getElementById('pbtn');
  b.textContent = d.btn; b.className = 'pbtn ' + d.act;
  document.getElementById('panel').classList.add('show');
}
function closePanel() {
  document.getElementById('panel').classList.remove('show');
  if (lit) { lit.classList.remove('lit'); lit = null; }
}
document.getElementById('wrap').addEventListener('click', e => {
  if (!e.target.closest('.field') && !e.target.closest('#panel')) closePanel();
});
</script>
</body>
</html>
