<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>World Map v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060810; font-family: system-ui, -apple-system, sans-serif; }

#wrap {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 12px;
}

#map {
  width: min(100%, 460px);
  height: auto;
  display: block;
  filter: drop-shadow(0 4px 24px rgba(0,0,0,0.8));
}

.field { cursor: pointer; }
.field:hover { filter: brightness(1.3); }
.field.lit { filter: brightness(1.5) drop-shadow(0 0 8px rgba(255,255,120,0.3)); }

/* Detail panel */
#panel {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(6,8,18,0.97);
  border: 1px solid #2a4870;
  border-radius: 10px;
  padding: 14px 16px;
  width: min(320px, calc(100vw - 24px));
  font-size: 13px;
  z-index: 100;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.9);
}
#panel.show { display: block; }
#panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
#panel-name { font-size: 15px; font-weight: 700; color: #fff; }
#panel-close { cursor: pointer; color: #555; font-size: 18px; line-height: 1; padding: 0 0 0 12px; }
.prow { display: flex; justify-content: space-between; margin-bottom: 5px; }
.prow .lbl { color: #666; }
.prow .val { color: #ccc; text-align: right; }
.prow .val.good { color: #81c784; }
.prow .val.warn { color: #ffd54f; }
.prow .val.rival { color: #ef9a9a; }
.pdiv { border-top: 1px solid #1a2a3a; margin: 8px 0; }
.pact {
  margin-top: 10px; width: 100%; padding: 9px; border: none; border-radius: 6px;
  font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px;
}
.pact.buy  { background: #1b3a20; color: #81c784; border: 1px solid #43a047; }
.pact.manage { background: #1a2a44; color: #90caf9; border: 1px solid #2a4a7a; }
.pact.harvest { background: #3a3000; color: #ffd54f; border: 1px solid #c8a000; }
.pact.scout { background: #2a1a3a; color: #ce93d8; border: 1px solid #6a2a8a; }
</style>
</head>

  </div>
  <div class="prow"><span class="lbl">Owner</span><span class="val" id="pd-owner">—</span></div>
  <div class="prow"><span class="lbl">Size</span><span class="val" id="pd-size">—</span></div>
  <div class="prow"><span class="lbl">Crop</span><span class="val" id="pd-crop">—</span></div>
  <div class="prow"><span class="lbl">Status</span><span class="val" id="pd-status">—</span></div>
  <div class="prow" id="pr-fertility"><span class="lbl">Fertility</span><span class="val" id="pd-fertility">—</span></div>
  <div class="prow" id="pr-price" style="display:none"><span class="lbl">Price</span><span class="val warn" id="pd-price">—</span></div>
  <button class="pact" id="panel-btn" onclick="closePanel()">—</button>
</div>

<script>
const DATA = {
  f1: { name:"Field F1", owner:"You", size:"42 ha", crop:"Corn 🌽", status:"Growing · 4 days left", statusCls:"good", fertility:"78%", action:"manage", btn:"Manage Field →" },
  f2: { name:"Field F2", owner:"You", size:"56 ha", crop:"Wheat 🌾", status:"Growing · 8 days left", statusCls:"good", fertility:"65%", action:"manage", btn:"Manage Field →" },
  f3: { name:"Field F3", owner:"You", size:"36 ha", crop:"None", status:"Unplanted", statusCls:"", fertility:"82%", action:"manage", btn:"Plant a Crop →" },
  f4: { name:"Field F4", owner:"Hacienda Rivera", size:"95 ha", crop:"Unknown", status:"Competitor field", statusCls:"rival", fertility:"?", action:"scout", btn:"Buy Scout Report ($500)" },
  f5: { name:"Field F5", owner:"You", size:"72 ha", crop:"Sunflower 🌻", status:"Growing · 11 days left", statusCls:"good", fertility:"70%", action:"manage", btn:"Manage Field →" },
  f6: { name:"Field F6", owner:"You", size:"64 ha", crop:"Wheat 🌾", status:"⚡ Ready to Harvest!", statusCls:"warn", fertility:"60%", action:"harvest", btn:"⚡ Harvest Now →" },
  f7: { name:"Field F7", owner:"For Sale", size:"78 ha", crop:"—", status:"Available now", statusCls:"warn", fertility:"74%", price:"$24,000", action:"buy", btn:"Buy Field ($24,000)" },
  f8: { name:"Field F8", owner:"Granja del Norte", size:"82 ha", crop:"Unknown", status:"Competitor field", statusCls:"rival", fertility:"?", action:"scout", btn:"Buy Scout Report ($500)" },
  f9: { name:"Field F9", owner:"You", size:"48 ha", crop:"None", status:"Unplanted", statusCls:"", fertility:"88%", action:"manage", btn:"Plant a Crop →" },
};

let active = null;

function sel(id) {
  if (active) active.classList.remove('lit');
  active = document.getElementById(id);
  if (active) active.classList.add('lit');

  const d = DATA[id];
  if (!d) return;
  document.getElementById('panel-name').textContent = d.name;
  document.getElementById('pd-owner').textContent = d.owner;
  document.getElementById('pd-size').textContent = d.size;
  document.getElementById('pd-crop').textContent = d.crop;

  const st = document.getElementById('pd-status');
  st.textContent = d.status;
  st.className = 'val ' + (d.statusCls || '');

  document.getElementById('pd-fertility').textContent = d.fertility;

  const pr = document.getElementById('pr-price');
  if (d.price) {
    pr.style.display = 'flex';
    document.getElementById('pd-price').textContent = d.price;
  } else {
    pr.style.display = 'none';
  }

  const btn = document.getElementById('panel-btn');
  btn.textContent = d.btn;
  btn.className = 'pact ' + d.action;

  document.getElementById('panel').classList.add('show');
}

function closePanel() {
  document.getElementById('panel').classList.remove('show');
  if (active) { active.classList.remove('lit'); active = null; }
}

document.getElementById('wrap').addEventListener('click', function(e) {
  if (!e.target.closest('.field') && !e.target.closest('#panel')) closePanel();
});
</script>
</body>
</html>
