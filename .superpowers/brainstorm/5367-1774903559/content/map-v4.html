<!DOCTYPE html>
<html lang="en">
<head>

<title>World Map v4</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#050709; display:flex; justify-content:center; }
#wrap { position:relative; width:min(100vw,520px); }
svg { width:100%; height:auto; display:block; }
.f { cursor:pointer; }
.f > path { transition:filter .12s; }
.f:hover > path { filter:brightness(1.4); }
.f.lit > path { filter:brightness(1.7) drop-shadow(0 0 5px rgba(255,235,80,.3)); }

#panel {
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  width:min(290px,calc(100vw - 20px));
  background:rgba(4,6,11,.97); border:1px solid #1c3050; border-radius:8px;
  padding:12px 14px; font-size:12px; z-index:50; display:none;
  box-shadow:0 6px 36px rgba(0,0,0,.92);
}
#panel.show { display:block; }
#ph { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
#pn { font-size:13px; font-weight:700; color:#ddd; }
#px { cursor:pointer; color:#3a3a3a; font-size:16px; padding-left:8px; }
.pr { display:flex; justify-content:space-between; margin-bottom:3px; }
.l { color:#505050; font-size:11px; }
.v { color:#aaa; font-size:11px; }
.vg { color:#62a838; }  .vy { color:#c8a830; }
.vr { color:#b84040; }  .vp { color:#8060c0; }
.div { border-top:1px solid #121c28; margin:6px 0; }
.btn {
  width:100%; margin-top:8px; padding:7px; border:none; border-radius:5px;
  font-size:12px; font-weight:700; cursor:pointer;
}
.manage  { background:#0e2014; color:#62a838; border:1px solid #225020; }
.harvest { background:#201a00; color:#c8a830; border:1px solid #504400; }
.buy     { background:#181200; color:#b07a10; border:1px solid #503c00; }
.scout   { background:#120c22; color:#8060c0; border:1px solid #301860; }
</style>
</head>

let lit=null;
function sel(id){
  if(lit)lit.classList.remove('lit');
  lit=document.getElementById(id);
  if(lit)lit.classList.add('lit');
  const d=D[id];if(!d)return;
  document.getElementById('pn').textContent=d.n;
  document.getElementById('po').textContent=d.o;
  document.getElementById('psz').textContent=d.sz;
  document.getElementById('pcr').textContent=d.cr;
  const s=document.getElementById('pst');s.textContent=d.st;s.className='v '+(d.sc||'');
  document.getElementById('pf').textContent=d.f;
  const pr=document.getElementById('pp-row');
  if(d.p){pr.style.display='flex';document.getElementById('pp').textContent=d.p;}else pr.style.display='none';
  const b=document.getElementById('pbtn');b.textContent=d.b;b.className='btn '+d.a;
  document.getElementById('panel').classList.add('show');
}
function close_(){
  document.getElementById('panel').classList.remove('show');
  if(lit){lit.classList.remove('lit');lit=null;}
}
document.getElementById('wrap').addEventListener('click',e=>{
  if(!e.target.closest('.f')&&!e.target.closest('#panel'))close_();
});
